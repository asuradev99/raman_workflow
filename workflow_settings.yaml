# =============================================================================
# Raman Workflow Settings — Per-Material Template
# =============================================================================
# Copy this file into a new material directory (e.g., vasp_calculations/NewMat/)
# and customize the fields below. All shared defaults (polarization, energies,
# VASP srun args, phonopy amplitude, band path, incar_raman, eigenvectors_band,
# hf_kpoints shift) are inherited from:
#
#   vasp_calculations/shared_workflow_settings.yaml
#
# You only need to set the fields that differ per material.
# =============================================================================

# ── Material identity ──────────────────────────────────────────────────────────
name: ""                          # <-- directory identifier (e.g., "hBN_PBEsol_4x4x1")

# ── Phonopy supercell dimensions ───────────────────────────────────────────────
phonopy:
  dim: "4 4 1"                   # <-- supercell size (e.g., "3 3 1", "4 4 1", etc.)

# ── HF k-points (coarse mesh for force constants) ──────────────────────────────
# Rule of thumb: hf_kpoints.mesh × supercell_dim ≈ primitive-cell k-mesh
#   e.g.,  primitive 36×36×1,  supercell 4×4×1 → hf_kpoints 6×6×1
hf_kpoints:
  mesh: "6 6 1"                  # <-- coarse mesh (e.g., "2 2 1" for 3×3×1)
